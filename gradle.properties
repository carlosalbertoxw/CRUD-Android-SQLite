# Ajustes de Gradle para el proyecto.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Ejecuta módulos independientes en paralelo.
org.gradle.parallel=true
# AndroidX es obligatorio para bibliotecas modernas (Compose, Room, etc.).
android.useAndroidX=true
# Kotlin en modo oficial de estilo de código.
kotlin.code.style=official
# Genera solo los recursos R de cada módulo (builds más rápidos).
android.nonTransitiveRClass=true
